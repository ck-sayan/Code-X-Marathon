<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-6 (Span & Div)</title>
</head>
<body>

    <!-- <span> is an inline element -->
    <!-- <div> is a block element -->
    
    <h1><span style="background-color: yellow;">This is a span title</span></h1>
    <h1><div style="background-color: tomato;">This is a div title</div></h1>

    <p>lorem ipsum dolor sit amet, <span style="background-color: green;">consectetur adipiscing elit.</span> Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>

    <p>lorem ipsum dolor sit amet, <div style="background-color: blueviolet;">consectetur adipiscing elit.</div> Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>

</body>
</html>
