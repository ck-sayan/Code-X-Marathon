<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-3 (Audio)</title>
</head>
<body>

    <!--This is all about audio tag
        Here are all the attributes:
        controls, autoplay, muted, loop
        src, type, preload, etc.
        -->
    <p>Arabic Music</p>
    <audio controls muted loop>
        <source src="./audio/arabic.mp3" type="audio/mpeg">
    </audio>
    <br>
    <p>Midnight Synthwave</p>
    <audio controls>
        <source src="./audio/midnight-synthwave.mp3" type="audio/mpeg">
    </audio>
    <br>
    <p>Sunrise</p>
    <audio controls autoplay loop>
        <source src="./audio/sunrise.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
